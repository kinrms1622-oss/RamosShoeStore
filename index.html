<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramos Shoe Store</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent-color: #111111;
            --accent-hover: #333333;
            --border-color: #e5e5e5;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.5;
            
            /* FIXED: Changed http to https to fix GitHub Pages Mixed Content block */
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), 
                        url('https://googleusercontent.com/image_collection/image_retrieval/2443870357464642914_0') no-repeat center center fixed;
            background-size: cover;
        }

        h1 {
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-size: 2.8rem;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Shoe Grid Layout */
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: var(--shadow);
            backdrop-filter: blur(5px);
        }

        .item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .item img {
            width: 100%;
            max-width: 200px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 16px;
        }

        .item p {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .qty-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Form Controls & Layout */
        .checkout-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
            max-width: 500px;
            margin: 0 auto;
            backdrop-filter: blur(5px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"], 
        input[type="text"], 
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #fafafa;
            transition: border-color 0.2s, background-color 0.2s;
        }

        input[type="number"] {
            width: 80px;
            text-align: center;
        }

        input[type="text"]:focus, 
        select:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
        }

        /* Summary Panel */
        #totalPrice {
            margin-top: 24px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            font-size: 1rem;
        }

        #totalPrice div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        #totalPrice div:last-child {
            margin-bottom: 0;
            padding-top: 8px;
            border-top: 1px dashed var(--border-color);
            font-size: 1.2rem;
        }

        /* Action Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 24px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button.secondary {
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
        }

        button:hover {
            background: var(--accent-hover);
        }

        button.secondary:hover {
            background: rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SoleStyle</h1>

    <div class="menu">
        <div class="item">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTErg2_s78su1599jzy4BMHqV8tUZqejcJCMEvwr2IykA&s=10" alt="Nike">
            <p>Nike - ₱6,500</p>
            <div class="qty-wrapper">
                <label for="qty-nike">Quantity</label>
                <input type="number" id="qty-nike" value="0" min="0">
            </div>
        </div>

        <div class="item">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7Gx-XExTyd0oZWVI-TVQO_1Gh7IE9aPgEcRshTTFxRw&s=10" alt="Adidas">
            <p>Adidas - ₱7,000</p>
            <div class="qty-wrapper">
                <label for="qty-adidas">Quantity</label>
                <input type="number" id="qty-adidas" value="0" min="0">
            </div>
        </div>

        <div class="item">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQTdUUMAACxKwYglqaUhHW7HcyglFDDqWq7oYFUrWuCkw&s=10" alt="New Balance">
            <p>New Balance - ₱6,200</p>
            <div class="qty-wrapper">
                <label for="qty-newbalance">Quantity</label>
                <input type="number" id="qty-newbalance" value="0" min="0">
            </div>
        </div>
    </div>

    <div class="checkout-section">
        <div class="form-group">
            <label for="customer">Customer Name</label>
            <input type="text" id="customer" placeholder="Enter customer name">
        </div>

        <div class="form-group">
            <label for="payment">Payment Method</label>
            <select id="payment">
                <option>Cash</option>
                <option>GCash</option>
                <option>Credit Card</option>
            </select>
        </div>

        <div class="form-group">
            <label for="discount">Discount Type</label>
            <select id="discount">
                <option value="0">None</option>
                <option value="0.20">Student (20%)</option>
                <option value="0.10">Member (10%)</option>
                <option value="0.25">Senior Citizen (25%)</option>
            </select>
        </div>

        <div id="totalPrice">
            <div><span>Discount:</span> <span id="val-discount">₱0.00</span></div>
            <div><span>Subtotal:</span> <span id="val-subtotal">₱0.00</span></div>
            <div><strong>Total:</strong> <strong id="val-total">₱0.00</strong></div>
        </div>

        <div class="button-group">
            <button class="secondary" onclick="calculateOrder()">Compute</button>
            <button onclick="submitOrder()">Submit Order</button>
        </div>
    </div>
</div>

<script>
const prices = {
    nike: 6500,
    adidas: 7000,
    newbalance: 6200
};

function calculateOrder(){
    const qtyNike = parseInt(document.getElementById("qty-nike").value) || 0;
    const qtyAdidas = parseInt(document.getElementById("qty-adidas").value) || 0;
    const qtyNewBalance = parseInt(document.getElementById("qty-newbalance").value) || 0;

    const subtotal = (qtyNike * prices.nike) + (qtyAdidas * prices.adidas) + (qtyNewBalance * prices.newbalance);
    const discountRate = parseFloat(document.getElementById("discount").value);
    
    const discount = subtotal * discountRate;
    const total = subtotal - discount;

    document.getElementById("val-discount").innerText = `₱${discount.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
    document.getElementById("val-subtotal").innerText = `₱${subtotal.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
    document.getElementById("val-total").innerText = `₱${total.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
}

function submitOrder(){
    const customerName = document.getElementById("customer").value.trim() || "Valued Customer";
    const qtyNike = parseInt(document.getElementById("qty-nike").value) || 0;
    const qtyAdidas = parseInt(document.getElementById("qty-adidas").value) || 0;
    const qtyNewBalance = parseInt(document.getElementById("qty-newbalance").value) || 0;

    const subtotal = (qtyNike * prices.nike) + (qtyAdidas * prices.adidas) + (qtyNewBalance * prices.newbalance);
    const discountRate = parseFloat(document.getElementById("discount").value);
    
    const discount = subtotal * discountRate;
    const total = subtotal - discount;
    const paymentMethod = document.getElementById("payment").value;

    if(subtotal === 0) {
        alert("Please select at least one item before submitting.");
        return;
    }

    alert(
        `🛒 Order Summary for ${customerName}\n\n` +
        `• Nike: ${qtyNike} pair(s)\n` +
        `• Adidas: ${qtyAdidas} pair(s)\n` +
        `• New Balance: ${qtyNewBalance} pair(s)\n\n` +
        `Subtotal: ₱${subtotal.toLocaleString('en-US', {minimumFractionDigits: 2})}\n` +
        `Discount: ₱${discount.toLocaleString('en-US', {minimumFractionDigits: 2})}\n` +
        `Total: ₱${total.toLocaleString('en-US', {minimumFractionDigits: 2})}\n\n` +
        `Payment Method: ${paymentMethod}\n\n` +
        `Order successfully handled locally!`
    );
}

document.getElementById("qty-nike").addEventListener("input", calculateOrder);
document.getElementById("qty-adidas").addEventListener("input", calculateOrder);
document.getElementById("qty-newbalance").addEventListener("input", calculateOrder);
document.getElementById("discount").addEventListener("change", calculateOrder);

calculateOrder();
</script>

</body>
</html>
